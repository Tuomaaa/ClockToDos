<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Todo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.10.4/mqtt.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #1c2a4a;
    --accent: #ff9ecd;
    --accent2: #1e90ff;
    --text: #e8e8f0;
    --muted: #8888aa;
    --danger: #ff6b6b;
    --success: #5cdb95;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    animation: fadeDown 0.6s ease;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--danger);
    transition: background 0.3s;
  }

  .status-dot.connected { background: var(--success); }

  .input-row {
    width: 100%;
    max-width: 420px;
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    animation: fadeUp 0.5s ease 0.2s both;
  }

  .input-row input {
    flex: 1;
    padding: 14px 18px;
    border: 2px solid transparent;
    border-radius: 14px;
    background: var(--card);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-row input::placeholder { color: var(--muted); font-weight: 400; }
  .input-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 158, 205, 0.15);
  }

  .input-row button {
    padding: 14px 22px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), #ff7eb3);
    color: var(--bg);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }

  .input-row button:active { transform: scale(0.95); }
  .input-row button:hover { box-shadow: 0 4px 20px rgba(255, 158, 205, 0.35); }

  .todo-list {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.5s ease 0.35s both;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card);
    border-radius: 14px;
    transition: transform 0.2s, opacity 0.3s;
    animation: slideIn 0.35s ease both;
  }

  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .todo-check {
    width: 24px; height: 24px;
    border-radius: 8px;
    border: 2px solid var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s, background 0.2s;
  }

  .todo-check:hover { border-color: var(--accent); }

  .todo-item.done .todo-check {
    border-color: var(--success);
    background: var(--success);
  }

  .todo-check svg {
    width: 14px; height: 14px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .todo-item.done .todo-check svg { opacity: 1; }

  .todo-text {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    word-break: break-word;
  }

  .todo-delete {
    width: 32px; height: 32px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }

  .todo-delete:hover { background: rgba(255,107,107,0.15); color: var(--danger); }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 0;
    font-size: 15px;
  }

  .empty-cat {
    font-size: 48px;
    margin-bottom: 8px;
    display: block;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Todo</h1>
  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Connecting...</span>
  </div>
</div>

<div class="input-row">
  <input type="text" id="todoInput" placeholder="Add a todo..." maxlength="60">
  <button onclick="addTodo()">Add</button>
</div>

<div class="todo-list" id="todoList"></div>

<script>
const BROKER = 'wss://69b873fc3df54b608947187aa47548bf.s1.eu.hivemq.cloud:8884/mqtt';
const USER = 'Tuostmm';
const PASS = 'Tuoma114514';
const TOPIC = 'tomacat/todo';

let todos = [];
let client = null;

function connectMQTT() {
  client = mqtt.connect(BROKER, {
    username: USER,
    password: PASS,
    clientId: 'tomacat-web-' + Math.random().toString(16).slice(2, 8),
    clean: true,
    reconnectPeriod: 3000
  });

  client.on('connect', () => {
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusText').textContent = 'Connected';
    client.subscribe(TOPIC, { qos: 1 });
  });

  client.on('offline', () => {
    document.getElementById('statusDot').classList.remove('connected');
    document.getElementById('statusText').textContent = 'Disconnected';
  });

  client.on('error', (err) => {
    console.error('MQTT error:', err);
    document.getElementById('statusText').textContent = 'Error';
  });

  client.on('message', (topic, message) => {
    if (topic === TOPIC) {
      try {
        const data = JSON.parse(message.toString());
        if (Array.isArray(data)) {
          todos = data;
          renderTodos();
        }
      } catch (e) {
        console.error('Parse error:', e);
      }
    }
  });
}

function publishTodos() {
  if (client && client.connected) {
    client.publish(TOPIC, JSON.stringify(todos), { qos: 1, retain: true });
  }
}

function addTodo() {
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if (!text) return;

  todos.push({ text: text, done: false });
  input.value = '';
  publishTodos();
  renderTodos();
}

function toggleTodo(index) {
  if (index >= 0 && index < todos.length) {
    todos[index].done = !todos[index].done;
    publishTodos();
    renderTodos();
  }
}

function deleteTodo(index) {
  if (index >= 0 && index < todos.length) {
    todos.splice(index, 1);
    publishTodos();
    renderTodos();
  }
}

function renderTodos() {
  const list = document.getElementById('todoList');

  if (todos.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <span class="empty-cat">🐱</span>
        Nothing to do~
      </div>`;
    return;
  }

  list.innerHTML = todos.map((todo, i) => `
    <div class="todo-item ${todo.done ? 'done' : ''}" style="animation-delay: ${i * 0.05}s">
      <div class="todo-check" onclick="toggleTodo(${i})">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <span class="todo-text">${escapeHtml(todo.text)}</span>
      <button class="todo-delete" onclick="deleteTodo(${i})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  `).join('');
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// Enter key to add
document.getElementById('todoInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addTodo();
});

connectMQTT();
renderTodos();
</script>
</body>
</html>
